name: Tests
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_call:
jobs:
  quality:
    name: Lint, Format, Dependencies
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Set up devenv
        uses: cachix/devenv-action@v1

      - name: Run git hooks
        run: devenv tasks run devenv:git-hooks:run

      - name: Check formatting
        run: |
          make format
          if [ -n "$(git status --porcelain)" ]; then
            echo "Code is not formatted. Please run 'make format'"
            git diff
            exit 1
          fi

      - name: Verify dependencies
        run: |
          devenv shell -- go mod verify
          devenv shell -- go mod tidy
          git diff --exit-code go.mod go.sum

  # Platform integration tests
  integration-tests:
    name: ${{ matrix.os }} Integration with Coverage
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        if: runner.os == 'macOS'
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Set up devenv
        if: runner.os == 'macOS'
        uses: cachix/devenv-action@v1

      - name: Set up Go
        if: runner.os == 'Windows'
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
          cache: true

      - name: Download dependencies (Windows)
        if: runner.os == 'Windows'
        run: go mod download

      - name: Download dependencies (macOS)
        if: runner.os == 'macOS'
        run: devenv shell -- go mod download

      - name: Run all tests (including integration)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            devenv shell -- go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
          else
            go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
          fi

      - name: Build Caddy with module
        if: runner.os == 'macOS'
        shell: bash
        run: devenv shell -- make caddy

      - name: Import test certificate (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          security import testdata/test-cert.p12 \
            -k $HOME/Library/Keychains/login.keychain-db \
            -P test123 \
            -T /usr/bin/codesign \
            -T /usr/bin/security || echo "Certificate may already exist"

      - name: Validate test configuration
        if: runner.os == 'macOS'
        shell: bash
        run: devenv shell -- ./build/darwin/caddy validate --config testdata/test-config.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration,${{ runner.os }}
          name: ${{ runner.os }}
